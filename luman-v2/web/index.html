<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUMAN OS</title>
<style>
  :root {
    --bg: #04070e; --panel: rgba(13,20,33,0.72); --panel2: rgba(8,13,22,0.85);
    --line: rgba(54,211,255,0.16); --line-strong: rgba(54,211,255,0.4);
    --text: #d6e6f2; --dim: #6b8398; --accent: #36d3ff; --accent2: #7c5cff;
    --good: #2ce6a6; --warn: #ffb347; --gold: #ffd66b;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; color: var(--text);
    font: 15px/1.6 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1100px 600px at 12% -8%, rgba(54,211,255,0.10), transparent 60%),
      radial-gradient(1000px 600px at 105% 0%, rgba(124,92,255,0.12), transparent 55%),
      #04070e;
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
  }
  /* faint HUD grid */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(54,211,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(54,211,255,0.045) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(circle at 50% 25%, #000 0%, transparent 80%);
  }
  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 22px 16px 72px; }

  @keyframes rise { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }

  header.banner {
    position: relative; text-align: center; padding: 30px 12px 26px;
    border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
    background: linear-gradient(180deg, rgba(20,30,48,0.55), rgba(6,10,18,0.65));
    box-shadow: 0 0 40px rgba(54,211,255,0.06), inset 0 1px 0 rgba(255,255,255,0.04);
    margin-bottom: 20px; animation: rise .5s ease both;
  }
  header.banner::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }
  header.banner h1 {
    margin: 0; font-size: 30px; letter-spacing: 8px; font-weight: 700;
    color: #eaf7ff; text-shadow: 0 0 18px rgba(54,211,255,0.55), 0 0 4px rgba(54,211,255,0.6);
  }
  header.banner .sub {
    font-family: var(--mono); color: var(--accent); letter-spacing: 4px;
    font-size: 11px; margin-top: 8px; text-transform: uppercase; opacity: .85;
  }
  header.banner::after {
    content: "● SYSTEM ONLINE"; position: absolute; top: 12px; right: 14px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--good);
    animation: pulse 2.4s ease-in-out infinite;
  }

  .card {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 18px; margin-bottom: 14px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
    animation: rise .5s ease both;
  }
  .card:hover { border-color: var(--line-strong); }
  .card h2 {
    margin: 0 0 12px; font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 2.5px; color: var(--accent);
  }
  .card h2::before { content: "// "; color: var(--accent2); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .focus { display:flex; gap:8px; align-items:center; }
  .focus input, input, select {
    flex:1; background: var(--panel2); border:1px solid var(--line); color: var(--text);
    border-radius:8px; padding:9px 11px; font-size:14px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  select { width: 100%; }
  select option { background: #0a1018; color: var(--text); }
  .focus input:focus, input:focus, select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 14px rgba(54,211,255,0.25);
  }
  .field { margin-bottom: 12px; }
  .field label { display:block; font-family: var(--mono); font-size:11px; letter-spacing:1.5px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
  input:disabled { opacity: .5; }
  button {
    background: rgba(54,211,255,0.06); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 14px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    transition: all .15s ease;
  }
  button:hover { border-color: var(--accent); color: #eaf7ff;
    box-shadow: 0 0 16px rgba(54,211,255,0.3); }
  button:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; border-color: var(--line); }
  button.primary {
    background: linear-gradient(180deg, rgba(54,211,255,0.18), rgba(54,211,255,0.07));
    border-color: var(--accent); color: #eaf7ff;
    box-shadow: 0 0 18px rgba(54,211,255,0.25);
  }
  .daily .nums { font-family: var(--mono); font-size: 16px; margin: 4px 0 10px; color: var(--dim); }
  .daily .nums b { color: var(--gold); text-shadow: 0 0 12px rgba(255,214,107,0.5); font-weight: 700; }
  .daily .directive { color: var(--text); }
  ol.pri { margin: 0; padding-left: 0; list-style: none; counter-reset: p; }
  ol.pri li { margin: 7px 0; padding-left: 30px; position: relative; }
  ol.pri li::before {
    counter-increment: p; content: "0" counter(p); position: absolute; left: 0; top: 0;
    font-family: var(--mono); font-size: 12px; color: var(--accent);
  }
  .loop { display:flex; align-items:flex-start; gap:10px; padding:10px 0;
    border-bottom:1px solid var(--line); }
  .loop:last-child { border-bottom:0; }
  .loop .meta { flex:1; }
  .loop .tag { font-family: var(--mono); color: var(--dim); font-size: 11px; letter-spacing: .5px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap:12px; }
  .tile {
    text-align:left; padding:16px 14px; border-radius:10px;
    background: linear-gradient(160deg, rgba(54,211,255,0.05), rgba(8,13,22,0.4));
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s;
  }
  .tile:hover { transform: translateY(-2px); border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(54,211,255,0.18); }
  .tile .n { font-family: var(--mono); color: var(--accent); font-size:11px; letter-spacing:1px; }
  .tile .name { font-size:15px; margin-top:4px; color: #eaf7ff; }
  .tile .planned { font-family: var(--mono); color: var(--warn); font-size:10px;
    text-transform: uppercase; letter-spacing:1px; margin-top:3px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px;
    font-family: var(--mono); font-size:11px; letter-spacing:1px; text-transform: uppercase; }
  .badge.ok { background:rgba(44,230,166,0.12); color:var(--good); border:1px solid var(--good);
    box-shadow: 0 0 12px rgba(44,230,166,0.25); }
  .badge.warn { background:rgba(255,179,71,0.12); color:var(--warn); border:1px solid var(--warn); }
  #panel { display:none; }
  #panel .content h3 { margin:16px 0 4px; font-size:16px; color:#eaf7ff; }
  #panel .content h4 { margin:12px 0 4px; font-size:13px; color:var(--accent);
    font-family: var(--mono); text-transform: uppercase; letter-spacing:1px; }
  #panel .content li { margin:3px 0; }
  pre.reading { white-space: pre-wrap; background: var(--panel2); padding:14px;
    border-radius:8px; border:1px solid var(--line); color: var(--accent);
    font: 13px/1.6 var(--mono); box-shadow: inset 0 0 30px rgba(54,211,255,0.06); }
  .muted { color: var(--dim); font-size: 13px; }
  a.link { color: var(--accent); cursor:pointer; font-family: var(--mono); font-size:12px;
    text-transform: uppercase; letter-spacing:1px; }
  a.link:hover { text-shadow: 0 0 10px rgba(54,211,255,0.6); }
  #chatLog { display:flex; flex-direction:column; gap:8px; max-height:360px; overflow-y:auto;
    padding-right: 4px; }
  .msg { padding:10px 13px; border-radius:10px; max-width:90%; white-space:pre-wrap; line-height:1.55; }
  .msg.user { align-self:flex-end; background: rgba(54,211,255,0.12); border:1px solid var(--accent); }
  .msg.luman { align-self:flex-start; background:var(--panel2); border:1px solid var(--line); }
  .msg.err { align-self:flex-start; background:rgba(255,179,71,0.1); border:1px solid var(--warn); color:var(--warn); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(54,211,255,0.2); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div class="wrap">
  <header class="banner">
    <h1 id="sysname">LUMAN OS</h1>
    <div class="sub" id="syssub">Living User Matrix Interface</div>
  </header>

  <div id="home">
    <div class="card">
      <div class="muted" id="mode"></div>
      <div class="focus" style="margin-top:8px">
        <input id="focusInput" placeholder="Active focus…">
        <button onclick="saveFocus()">Save</button>
      </div>
      <div style="margin-top:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap">
        <button class="primary" onclick="saveAll()">💾 Save to GitHub</button>
        <span class="muted" id="saveStatus"></span>
      </div>
    </div>

    <div class="card daily" id="dailyCard">
      <h2>Daily Harmonic Reading</h2>
      <div id="dailyBody" class="muted">—</div>
    </div>

    <div class="card">
      <h2>Top Priorities</h2>
      <ol class="pri" id="pri"></ol>
    </div>

    <div class="card">
      <h2>Open Loops · <span id="loopCount"></span></h2>
      <div id="loops"></div>
      <div class="focus" style="margin-top:10px">
        <input id="newLoop" placeholder="Add a loop…">
        <button onclick="addLoop()">Add</button>
      </div>
    </div>

    <div class="card">
      <h2>Main Menu</h2>
      <div class="grid" id="sections"></div>
    </div>

    <div class="card">
      <h2>System</h2>
      <div id="doctor"></div>
    </div>

    <div class="card">
      <h2>Ask LUMAN</h2>
      <div id="chatSetup" class="muted" style="display:none; margin-bottom:8px"></div>
      <div id="chatLog"></div>
      <div class="focus" style="margin-top:10px">
        <input id="chatInput" placeholder="Talk to LUMAN…"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button id="chatSend" class="primary" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

  <div id="panel" class="card">
    <a class="link" onclick="showHome()">← back to menu</a>
    <h2 id="panelTitle" style="margin-top:10px"></h2>
    <div class="muted" id="panelPurpose"></div>
    <div id="panelExtra" style="margin-top:10px"></div>
    <div class="content" id="panelContent" style="margin-top:8px"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
async function api(path, opts) { const r = await fetch(path, opts); return r.json(); }
async function post(path, body) {
  return api(path, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
}

function miniMarkdown(md) {
  const out = []; let inList = false;
  for (const raw of md.split('\n')) {
    const line = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if (line.startsWith('## ')) { if(inList){out.push('</ul>');inList=false;} out.push('<h4>'+line.slice(3)+'</h4>'); }
    else if (line.startsWith('# ')) { if(inList){out.push('</ul>');inList=false;} out.push('<h3>'+line.slice(2)+'</h3>'); }
    else if (line.startsWith('- ')) { if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+line.slice(2)+'</li>'); }
    else if (line.trim()==='') { if(inList){out.push('</ul>');inList=false;} }
    else { if(inList){out.push('</ul>');inList=false;} out.push('<p>'+line+'</p>'); }
  }
  if(inList) out.push('</ul>');
  return out.join('');
}

async function load() {
  const h = await api('/api/home');
  $('sysname').textContent = h.system.name;
  $('syssub').textContent = h.system.subtitle;
  $('mode').textContent = 'Mode: ' + h.mode;
  $('focusInput').value = h.active_focus;

  if (h.daily) {
    $('dailyBody').innerHTML =
      `<div class="nums">${h.daily.date} — Personal Year <b>${h.daily.personal_year}</b> · `
      + `Personal Month <b>${h.daily.personal_month}</b> · Personal Day <b>${h.daily.personal_day}</b></div>`
      + `<div class="directive">${h.daily.directive}</div>`;
  } else { $('dailyBody').textContent = 'No daily reading configured.'; }

  $('pri').innerHTML = h.top_three.map(p => `<li>${p}</li>`).join('');

  $('loopCount').textContent = h.open_loops.length;
  $('loops').innerHTML = h.open_loops.sort((a,b)=>(a.priority||99)-(b.priority||99)).map(l =>
    `<div class="loop"><div class="meta"><div>${l.title}</div>`
    + `<div class="tag">(${l.id}) ${l.section||'-'} · ${l.status}</div></div>`
    + `<button onclick="doneLoop('${l.id}')">Done</button></div>`).join('') || '<div class="muted">No open loops.</div>';

  $('sections').innerHTML = h.sections.map((s,i) =>
    `<button class="tile" onclick="openSection('${s.id}')">`
    + `<div class="n">[${i+1}]</div><div class="name">${s.name}</div>`
    + (s.status!=='active' ? `<div class="planned">${s.status}</div>` : '') + `</button>`).join('');

  const d = h.doctor;
  $('doctor').innerHTML = d.problems
    ? `<span class="badge warn">${d.problems} problem(s)</span>`
    : `<span class="badge ok">consistent</span>`
    + (d.warnings ? ` <span class="muted">· ${d.warnings} planned section(s) not built</span>` : '')
    + ` <span class="muted">· Next: ${h.next}</span>`;
}

async function openSection(id) {
  const s = await api('/api/section/' + id);
  $('panelTitle').textContent = s.name + '  (' + s.status + ')';
  $('panelPurpose').textContent = s.purpose;
  let ex = '';
  if (s.items && s.items.length) {
    ex += '<div class="grid">' + s.items.map(it =>
      `<button class="tile" onclick="openItem('${id}','${it.id}','${it.action||''}')">`
      + `<div class="name">${esc(it.name)}</div>`
      + (it.desc ? `<div class="muted" style="font-size:12px;margin-top:4px">${esc(it.desc)}</div>` : '')
      + `</button>`).join('') + '</div>';
  }
  $('panelExtra').innerHTML = ex;
  $('panelContent').innerHTML = s.content ? miniMarkdown(s.content) : '<p class="muted">No content yet.</p>';
  $('home').style.display = 'none'; $('panel').style.display = 'block';
  window.scrollTo(0,0);
}

async function openItem(sectionId, itemId, action) {
  if (action === 'harmonic') { return fullReading(); }
  if (action === 'lucid') { return openLucidStudio(sectionId); }
  const it = await api('/api/item/' + sectionId + '/' + itemId);
  $('panelExtra').innerHTML =
    `<a class="link" onclick="openSection('${sectionId}')">← back to section</a>`;
  $('panelContent').innerHTML =
    `<h3 style="margin-top:12px">${esc(it.name)}</h3>`
    + (it.desc ? `<p class="muted">${esc(it.desc)}</p>` : '')
    + (it.content ? miniMarkdown(it.content) : '<p class="muted">Coming soon — this area is reserved.</p>');
  window.scrollTo(0,0);
}
async function fullReading() {
  const r = await api('/api/harmonic/edward');
  $('panelContent').innerHTML = '<pre class="reading">' +
    r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
}
function showHome(){ $('panel').style.display='none'; $('home').style.display='block'; }

// ---- Lucid Syntax Promo Studio ----
let lucidData = null;
async function openLucidStudio(sectionId){
  lucidData = await api('/api/lucid');
  $('panelTitle').textContent = 'Music Section — Promo Studio';
  $('panelPurpose').textContent = 'Pick an album, a song, and a format, then generate a promo pack.';
  $('panelExtra').innerHTML = `<a class="link" onclick="openSection('${sectionId}')">← back to section</a>`;
  const albumOpts = lucidData.albums.map(a => `<option value="${a.id}">${esc(a.name)}</option>`).join('');
  const fmtOpts = lucidData.formats.map(f => `<option value="${f.id}">${esc(f.name)}</option>`).join('');
  $('panelContent').innerHTML =
    `<div class="field"><label>Album</label>
       <select id="lucidAlbum" onchange="lucidFillSongs()">${albumOpts}</select></div>
     <div class="field"><label>Song</label><select id="lucidSong"></select></div>
     <div class="field"><label>Format</label><select id="lucidFormat">${fmtOpts}</select></div>
     <button class="primary" onclick="lucidGenerate()">Generate Promo Pack</button>
     <div id="lucidOut" style="margin-top:16px"></div>`;
  lucidFillSongs();
  $('home').style.display = 'none'; $('panel').style.display = 'block';
  window.scrollTo(0,0);
}
function lucidFillSongs(){
  const a = lucidData.albums.find(x => x.id === $('lucidAlbum').value);
  $('lucidSong').innerHTML = (a ? a.songs : []).map(s => `<option>${esc(s)}</option>`).join('');
}
async function lucidGenerate(){
  const out = $('lucidOut');
  out.innerHTML = '<span class="muted">Working…</span>';
  const r = await post('/api/lucid/promo', {
    album: $('lucidAlbum').value, song: $('lucidSong').value, format: $('lucidFormat').value });
  if (r.error && !r.command){ out.innerHTML = `<div class="msg err">${esc(r.error)}</div>`; return; }
  let html = `<div class="field"><label>Command for your ChatGPT GPT</label>`
    + `<div style="display:flex; gap:8px; align-items:center">`
    + `<code id="lucidCmd" style="flex:1; font-family:var(--mono); color:var(--accent); `
    + `background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:9px 11px">${esc(r.command)}</code>`
    + `<button onclick="copyEl('lucidCmd')">Copy</button></div></div>`;
  if (r.reply){
    html += `<div class="field"><label>Generated pack</label>`
      + `<pre class="reading">${esc(r.reply)}</pre>`
      + `<button onclick="copyEl('lucidPack')">Copy pack</button>`
      + `<div id="lucidPack" style="display:none">${esc(r.reply)}</div></div>`;
  } else if (r.message){
    html += `<div class="msg err" style="margin-top:8px">${esc(r.message)}</div>`;
  } else {
    html += `<p class="muted" style="margin-top:8px">Paste that command into your Lucid Syntax Promo Pro GPT to generate the pack. `
      + `Turn on Ask LUMAN (add a Claude API key) to generate it right here instead.</p>`;
  }
  out.innerHTML = html;
}
function copyEl(id){
  const t = $(id).textContent;
  navigator.clipboard && navigator.clipboard.writeText(t);
}

async function doneLoop(id){ await post('/api/loop/done', {id}); load(); }
async function addLoop(){ const t=$('newLoop').value.trim(); if(!t) return; await post('/api/loop/add',{title:t}); $('newLoop').value=''; load(); }
async function saveFocus(){ await post('/api/focus', {text: $('focusInput').value}); load(); }

async function saveAll(){
  $('saveStatus').textContent = 'Saving…';
  const r = await post('/api/save', {});
  $('saveStatus').textContent = r.message || (r.ok ? 'Saved.' : 'Save failed.');
}

// ---- Ask LUMAN (chat) ----
const chatHistory = [];
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function renderChat(){
  $('chatLog').innerHTML = chatHistory.map(m =>
    `<div class="msg ${m.cls||m.role}">${esc(m.content)}</div>`).join('');
  $('chatLog').scrollTop = $('chatLog').scrollHeight;
}
async function loadChatStatus(){
  const s = await api('/api/assistant/status');
  const ready = s.ready;
  $('chatInput').disabled = !ready;
  $('chatSend').disabled = !ready;
  if (!ready){
    $('chatInput').placeholder = 'Coming soon — turn on with your Claude API key';
    $('chatSetup').style.display = 'block';
    $('chatSetup').textContent =
      "This is where you'll talk to LUMAN. It comes alive once you add a Claude API key — " +
      "we'll set that up when you're ready. For now, it's reserved and waiting here on your screen.";
  } else {
    $('chatSetup').style.display = 'none';
    $('chatInput').placeholder = 'Talk to LUMAN…';
  }
}
async function sendChat(){
  const t = $('chatInput').value.trim();
  if(!t) return;
  $('chatInput').value = '';
  chatHistory.push({role:'user', content:t});
  chatHistory.push({role:'luman', content:'…', _pending:true});
  renderChat();
  const r = await post('/api/chat', {messages: chatHistory
    .filter(m=>!m._pending).map(m=>({role: m.role==='user'?'user':'assistant', content:m.content}))});
  chatHistory.pop(); // remove pending
  if (r.reply) chatHistory.push({role:'luman', content:r.reply});
  else chatHistory.push({role:'luman', cls:'err', content:r.message || 'Something went wrong.'});
  renderChat();
}

load();
loadChatStatus();
</script>
</body>
</html>
