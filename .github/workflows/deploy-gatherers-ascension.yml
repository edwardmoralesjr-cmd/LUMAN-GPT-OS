name: Deploy Gatherer's Ascension

on:
  push:
    branches:
      - main
    paths:
      - "LUMAN_OS/game_lab/gatherers_ascension/app/**"
      - ".github/workflows/deploy-gatherers-ascension.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  APP_DIRECTORY: LUMAN_OS/game_lab/gatherers_ascension/app

jobs:
  build:
    name: Build game
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.APP_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm ci

      - name: Build production game
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.APP_DIRECTORY }}/dist

  deploy:
    name: Publish game
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
