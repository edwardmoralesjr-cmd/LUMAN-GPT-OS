<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09110f" />
    <meta
      name="description"
      content="Gatherer's Ascension is a peaceful visual gathering RPG about harvesting, leveling, upgrading gear, completing a Collection Codex, and discovering hidden rare materials."
    />
    <title>Gatherer's Ascension</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar glass-panel">
        <div>
          <p class="eyebrow">WORLDROOT PROTOTYPE</p>
          <h1>Gatherer's Ascension</h1>
        </div>
        <div class="topbar-actions">
          <span id="save-status" class="save-status">Loading save…</span>
          <button id="cloud-button" class="secondary-button" type="button">Connect GitHub Save</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="game-shell glass-panel">
          <div id="game-container" aria-label="Gatherer's Ascension game world"></div>
          <div class="mobile-controls" aria-label="Touch movement controls">
            <button data-move="up" aria-label="Move up">▲</button>
            <div>
              <button data-move="left" aria-label="Move left">◀</button>
              <button data-move="down" aria-label="Move down">▼</button>
              <button data-move="right" aria-label="Move right">▶</button>
            </div>
          </div>
          <div class="world-hint">Move with WASD, arrow keys, touch controls, or tap the world. Gathering happens automatically nearby.</div>
        </section>

        <aside class="side-panel glass-panel">
          <nav class="tabs" aria-label="Game panels">
            <button class="tab active" data-tab="status">Status</button>
            <button class="tab" data-tab="inventory">Inventory</button>
            <button class="tab" data-tab="codex">Codex</button>
            <button class="tab" data-tab="market">Market</button>
            <button class="tab" data-tab="biomes">Biomes</button>
          </nav>
          <div id="panel-content" class="panel-content"></div>
        </aside>
      </main>

      <div id="toast-layer" class="toast-layer" aria-live="polite"></div>
      <div id="discovery-layer" class="discovery-layer" aria-live="assertive"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
